name: CI / CD — CampusTouch Frontend

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  APP_DIR: campus_app

jobs:
  ci:
    name: 🔍 Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: campus_app/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: 🔎 Lint
        working-directory: ${{ env.APP_DIR }}
        run: npm run lint

      - name: 🏗️ Build
        working-directory: ${{ env.APP_DIR }}
        run: npm run build

      - name: 📤 Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: campus_app/dist

  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4